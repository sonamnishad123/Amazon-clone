<!DOCTYPE html>
<html>
<head>
    <title>Electronics</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f3f3f3;
        }
        .header {
            background-color: #131921;
            color: white;
            width: 100%;
        }
        .header-inner{
            display:flex;
            padding:10px;
            align-items:center;
            flex-wrap:wrap;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-right: 20px;
        }
        .search-area {
            flex: 1;
            display: flex;
            max-width: 100%;
        }
        .search-box {
            flex: 1;
            padding: 8px;
            border: none;
        }
        .account {
            font-size: 12px;
            margin-left: 20px;
        }
        .nav {
            background-color: #232f3e;
            padding: 10px;
        }
        .nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }
        .banner img {
            width: 100%;
        }
        .products {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .product {
            background-color: white;
            width: 220px;
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .product img {
            width: 100%;
            height: 70%;
        }
        .footer {
            background-color: #131921;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            background: rgba(0,0,0,0.6);

            display: none;

            justify-content: center;
            align-items: center;

            z-index: 1000;
        }

        .popup-content {
            background: white;
            padding: 30px;
            width: 300px;
            text-align: center;
            border-radius: 10px;
        }

        .popup-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        .popup-content button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 15px;
            background: white;

            flex-wrap: wrap;
        }

        #priceFilter {
            padding: 10px;
        }

        .cart-box {
            font-size: 20px;
            font-weight: bold;
        }

        .product button {
            background-color: #febd69;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }

        .product button:hover {
            background-color: orange;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <div class="logo">amazon</div>
        <div class="search-area">
            <input class="search-box" placeholder="Search Amazon">
            <button class="search-btn" onclick="searchProducts()">
                Search
            </button>
        <div class="account">
            Hello, Sign in<br>
            <b>Account & Lists</b>
        </div>
        </div>
    </div>
</div>

<div id="loginPopup" class="popup">
    <div class="popup-content">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Enter your name">

        <button onclick="loginUser()">Login</button>

        <button onclick="closePopup()">Close</button>
    </div>
</div>

<div class="top-controls">

    <select id="priceFilter" onchange="filterProducts()">
        <option value="all">All Products</option>
        <option value="low">Below ₹1000</option>
        <option value="mid">₹1000 - ₹10000</option>
        <option value="high">Above ₹10000</option>
    </select>

    <div class="cart-box">
        🛒 Cart:
        <span id="cart-count">0</span>
    </div>

</div>
<nav class="nav">
    <a href="index.html">Home</a>
    <a href="fruitnvegitable.html">Fruit & Vegitables</a>
    <a href="electronics.html">Electronics</a>
    <a href="fashion.html">Fashion</a>
    <a href="homenkitchen.html">Home & Kitchen</a>
</nav>
<div class="banner">
    <img src="https://m.media-amazon.com/images/G/31/img20/Wireless/ElectronicsStore/GW/New/1242x450.jpg">
</div>
<div class="products">
    <div class="product">
        <img src="https://static.independent.co.uk/2025/08/27/16/02/Best-laptops-Indybest-review.png?quality=75&width=1368&crop=3%3A2%2Csmart&trim=0%2C0%2C0%2C0&auto=webp">
        <h3>Laptop</h3>
        <p>₹59,999</p>
        <button onclick="addToCart('Wireless Mouse')">
            Add to Cart
        </button>
    </div>
    <div class="product">
        <img src="https://media.wired.com/photos/683a782e13687d4580a2c63a/4:3/w_1280%2Cc_limit/StormBox%25202%2520ryan%2520waniata.png">
        <h3>Bluetooth Speaker</h3>
        <p>₹2,499</p>
        <button onclick="addToCart('Wireless Mouse')">
            Add to Cart
        </button>
    </div>
    <div class="product">
        <img src="https://res.cloudinary.com/dnpkvlbae/image/fetch/c_auto,f_auto,q_auto:best,w_1600/https://s3.infra.brandquad.io/accounts-media/SHRP/DAM/origin/57e13958-4e73-11ef-904d-bea7e36404f4.jpg">
        <h3>Smart TV</h3>
        <p>₹79,999</p>
        <button onclick="addToCart('Wireless Mouse')">
            Add to Cart
        </button>
    </div>
</div>
<br>
<div class="footer">
    © 2025 Amazon Clone
</div>
<script src="script.js"></script>
</body>
</html>
