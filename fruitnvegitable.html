<!DOCTYPE html>
<html>
<head>
    <title>Fruit & Vegetables</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
        }
        .header {
            width: auto;
            background-color: #131921;
            color: white;
        }
        .header-inner {
            display: flex;
            align-items: center;
            padding: 10px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-right: 20px;
        }
        .search-area {
            flex: 1;
            display: flex;
            max-width: 100%;
        }
        .search-box {
            flex: 1;
            padding: 8px;
            border: none;
        }
        .account {
            font-size: 12px;
            margin-left: 20px;
        }
        .nav {
            background-color: #232f3e;
            padding: 10px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        .banner img {
            width: 100%;
            height: 300px;
        }
        .products {
            padding: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .product {
            background-color: white;
            width: 220px;
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .product img {
            width: 100%;
            height: 75%;
        }
        .footer {
            background-color: #131921;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            background: rgba(0,0,0,0.6);

            display: none;

            justify-content: center;
            align-items: center;

            z-index: 1000;
        }

        .popup-content {
            background: white;
            padding: 30px;
            width: 300px;
            text-align: center;
            border-radius: 10px;
        }

        .popup-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        .popup-content button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 15px;
            background: white;

            flex-wrap: wrap;
        }

        #priceFilter {
            padding: 10px;
        }

        .cart-box {
            font-size: 20px;
            font-weight: bold;
        }

        .product button {
            background-color: #febd69;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }

        .product button:hover {
            background-color: orange;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <div class="logo">amazon</div>
        <div class="search-area">
            <input class="search-box" placeholder="Search Amazon">
            <button class="search-btn" onclick="searchProducts()">
                Search
            </button>
        </div>
        <div class="account">
            Hello, Sign in<br>
            <b>Account & Lists</b>
        </div>
    </div>
</div>

<div id="loginPopup" class="popup">
    <div class="popup-content">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Enter your name">

        <button onclick="loginUser()">Login</button>

        <button onclick="closePopup()">Close</button>
    </div>
</div>


<div class="top-controls">

    <select id="priceFilter" onchange="filterProducts()">
        <option value="all">All Products</option>
        <option value="low">Below ₹1000</option>
        <option value="mid">₹1000 - ₹10000</option>
        <option value="high">Above ₹10000</option>
    </select>

    <div class="cart-box">
        🛒 Cart:
        <span id="cart-count">0</span>
    </div>

</div>
<nav class="nav">
    <a href="index.html">Home</a>
    <a href="fruitnvegitable.html">Fruit & Vegitables</a>
    <a href="electronics.html">Electronics</a>
    <a href="fashion.html">Fashion</a>
    <a href="homenkitchen.html">Home & Kitchen</a>
</nav>
<div class="banner">
    <img src="https://m.media-amazon.com/images/G/31/img18/Fresh/Promotion/FV2.jpg">
</div>
<div class="products">
    <div class="product">
        <img src="https://5.imimg.com/data5/YC/RD/MY-24297587/avocado-fruit-1000x1000.jpg">
        <h3>Avocado</h3>
        <p>₹100/piece</p>
        <button onclick="addToCart('Wireless Mouse')">
            Add to Cart
        </button>
    </div>
    <div class="product">
        <img src="https://www.fervalle.com/wp-content/uploads/2022/07/Green-Broccoli-Transparent-Images-PNG.png">
        <h3>Broccoli</h3>
        <p>₹500/100gm</p>
        <button onclick="addToCart('Wireless Mouse')">
            Add to Cart
        </button>
    </div>
</div>
<br>
<div class="footer">
    © 2025 Amazon Clone
</div>
<script src="script.js"></script>
</body>
</html>
